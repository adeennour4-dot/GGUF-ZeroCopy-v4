- name: Build Debug APK (with memory-saving flags)
  run: |
    export PATH=/usr/bin:$PATH
    # Increase available memory for build
    free -h
    ./gradlew assembleDebug \
      --no-daemon \
      --stacktrace \
      -Pandroid.ndkVersion=28.2.13676358 \
      -Porg.gradle.jvmargs="-Xmx3g -XX:MaxMetaspaceSize=256m" \
      -Pandroid.defaults.buildfeatures.cmakejobs=2
  env:
    ANDROID_NDK:      ${{ env.ANDROID_NDK }}
    ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
    PATH: ${{ env.ANDROID_SDK_ROOT }}/ndk/28.2.13676358/shader-tools/linux-x86_64:${{ env.PATH }}
